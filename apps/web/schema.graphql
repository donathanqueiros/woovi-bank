type Query {
  me: Me
  account(id: ID!): Account
  accounts(page: Int, limit: Int): [Account!]!
  accountsCount: Int!
  transaction(id: ID!): Transaction
  transactions(page: Int, limit: Int, accountId: ID): [Transaction!]!
  transactionsCount(accountId: ID): Int!
}

type Me {
  id: ID!
  email: String!
  role: QueryUserRole!
  active: Boolean!
  accountId: ID
}

enum QueryUserRole {
  USER
  ADMIN
}

type Account {
  id: ID!
  holderName: String!
  balance: Float!
  createdAt: String!
}

type Transaction {
  id: ID!
  fromAccount: Account!
  toAccount: Account!
  amount: Float!
  idempotencyKey: String!
  description: String
  createdAt: String!
}

type Mutation {
  AddCredit(accountId: String!, amount: Float!, idempotencyKey: String!): Account!
  CreateAccount(holderName: String!): Account!
  DeleteUser(userId: String!): Boolean!
  Transfer(fromAccountId: String!, toAccountId: String!, amount: Float!, idempotencyKey: String!, description: String): Transaction!
  Login(email: String!, password: String!): AuthPayload!
  Logout: Boolean!
  SignUp(email: String!, password: String!): AuthPayload!
}

type AuthPayload {
  user: User!
  account: Account!
}

type User {
  id: ID!
  email: String!
  role: UserRole!
  active: Boolean!
  createdAt: String!
}

enum UserRole {
  USER
  ADMIN
}
