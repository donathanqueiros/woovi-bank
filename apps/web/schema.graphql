type Query {
  me: Me
  account(id: ID!): Account
  accounts(page: Int, limit: Int): [Account!]!
  accountsCount: Int!
  transaction(id: ID!): Transaction
  transactions(page: Int, limit: Int, accountId: ID): [Transaction!]!
  transactionsCount(accountId: ID): Int!
  myKyc: Kyc
}

type Me {
  id: ID!
  email: String!
  role: QueryUserRole!
  active: Boolean!
  accountId: ID
  kycStatus: KycStatus!
}

enum QueryUserRole {
  USER
  ADMIN
}

type Account {
  id: ID!
  holderName: String!
  balance: Float!
  createdAt: String!
}

type Transaction {
  id: ID!
  fromAccount: Account!
  toAccount: Account!
  amount: Float!
  idempotencyKey: String!
  description: String
  createdAt: String!
}

type Mutation {
  AddCredit(accountId: String!, amount: Float!, idempotencyKey: String!): Account!
  CreateAccount(holderName: String!): Account!
  DeleteUser(userId: String!): Boolean!
  Transfer(fromAccountId: String!, toAccountId: String!, amount: Float!, idempotencyKey: String!, description: String): Transaction!
  Login(email: String!, password: String!): AuthPayload!
  Logout: Boolean!
  SignUp(email: String!, password: String!): AuthPayload!
  SubmitKyc(
    fullName: String!
    email: String!
    phone: String!
    dateOfBirth: String!
    country: String!
    street: String!
    city: String!
    state: String!
    postalCode: String!
    proofDocumentBase64: String
    proofDocumentMimeType: String
    idType: String!
    idNumber: String!
    frontImageBase64: String!
    backImageBase64: String
    selfieBase64: String!
  ): Kyc!
}

type AuthPayload {
  user: User!
  account: Account!
}

type User {
  id: ID!
  email: String!
  role: UserRole!
  active: Boolean!
  createdAt: String!
}

enum UserRole {
  USER
  ADMIN
}

type Subscription {
  transferReceived(accountId: ID!): TransferReceived!
}

type TransferReceived {
  transactionId: ID!
  fromAccountId: ID!
  fromAccountHolderName: String!
  toAccountId: ID!
  amount: Float!
  description: String
  createdAt: String!
}

enum KycStatus {
  PENDING_SUBMISSION
  UNDER_REVIEW
  APPROVED
  REJECTED
}

enum KycIdType {
  PASSPORT
  DRIVERS_LICENSE
  RG
}

type KycPersonalInfo {
  fullName: String
  email: String
  phone: String
  dateOfBirth: String
  country: String
}

type KycAddress {
  street: String
  city: String
  state: String
  postalCode: String
}

type KycIdentity {
  idType: KycIdType
  idNumber: String
}

type Kyc {
  id: ID!
  status: KycStatus!
  personalInfo: KycPersonalInfo
  address: KycAddress
  identity: KycIdentity
  submittedAt: String
  reviewNotes: String
}
