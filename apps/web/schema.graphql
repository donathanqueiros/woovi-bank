type Query {
  me: Me
  users: [User!]!
  account(id: ID!): Account
  accounts(page: Int, limit: Int): [Account!]!
  accountsCount: Int!
  transaction(id: ID!): Transaction
  transactions(page: Int, limit: Int, accountId: ID): [Transaction!]!
  transactionsCount(accountId: ID): Int!
  myDeposits(page: Int, limit: Int, status: DepositRequestStatus): [DepositRequest!]!
  myDepositsCount(status: DepositRequestStatus): Int!
  myKyc: Kyc
}

type Me {
  id: ID!
  email: String!
  role: QueryUserRole!
  active: Boolean!
  accountId: ID
  kycStatus: KycStatus!
}

enum QueryUserRole {
  USER
  ADMIN
}

enum KycStatus {
  PENDING_SUBMISSION
  UNDER_REVIEW
  APPROVED
  REJECTED
}

type User {
  id: ID!
  email: String!
  role: UserRole!
  active: Boolean!
  createdAt: String!
}

enum UserRole {
  USER
  ADMIN
}

type Account {
  id: ID!
  holderName: String!
  balance: Float
  createdAt: String!
}

type Transaction {
  id: ID!
  fromAccount: Account!
  toAccount: Account!
  amount: Float!
  description: String
  createdAt: String!
}

type DepositRequest {
  id: ID!
  accountId: ID!
  correlationID: String!
  requestedAmount: Float!
  paidAmount: Float
  status: DepositRequestStatus!
  brCode: String
  qrCodeImage: String
  expiresDate: String
  comment: String
  createdAt: String!
  completedAt: String
  expiredAt: String
}

enum DepositRequestStatus {
  PENDING
  COMPLETED
  EXPIRED
  CANCELED
}

type Kyc {
  id: ID!
  status: KycStatus!
  personalInfo: KycPersonalInfo
  address: KycAddress
  identity: KycIdentity
  submittedAt: String
  reviewNotes: String
}

type KycPersonalInfo {
  fullName: String
  email: String
  phone: String
  dateOfBirth: String
  country: String
}

type KycAddress {
  street: String
  city: String
  state: String
  postalCode: String
}

type KycIdentity {
  idType: KycIdType
  idNumber: String
}

enum KycIdType {
  PASSPORT
  DRIVERS_LICENSE
  RG
}

type Mutation {
  AddCredit(accountId: String!, amount: Float!, idempotencyKey: String!): Account!
  CreateAccount(holderName: String!): Account!
  DeleteUser(userId: String!): Boolean!
  CreateDeposit(amount: Float!, comment: String, expiresDate: String): DepositRequest!
  CancelLatestDeposit: DepositRequest!
  Transfer(fromAccountId: String!, toAccountId: String!, amount: Float!, idempotencyKey: String!, description: String): Transaction!
  Login(email: String!, password: String!): AuthPayload!
  Logout: Boolean!
  SignUp(email: String!, password: String!): AuthPayload!
  SubmitKyc(fullName: String!, email: String!, phone: String!, dateOfBirth: String!, country: String!, street: String!, city: String!, state: String!, postalCode: String!, proofDocumentBase64: String, proofDocumentMimeType: String, idType: String!, idNumber: String!, frontImageBase64: String!, backImageBase64: String, selfieBase64: String!): Kyc!
}

type AuthPayload {
  user: User!
  account: Account!
}

type Subscription {
  depositConfirmed(accountId: ID!): DepositConfirmed!
  transferReceived(accountId: ID!): TransferReceived!
}

type DepositConfirmed {
  depositId: ID!
  accountId: ID!
  correlationID: String!
  amount: Float!
  createdAt: String!
  completedAt: String!
}

type TransferReceived {
  transactionId: ID!
  fromAccountId: ID!
  fromAccountHolderName: String!
  toAccountId: ID!
  amount: Float!
  description: String
  createdAt: String!
}
