services:
  mongo1:
    image: mongo:7
    command: ["mongod", "--replSet", "myReplicaSet", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db

  mongo2:
    image: mongo:7
    command: ["mongod", "--replSet", "myReplicaSet", "--bind_ip_all", "--port", "27017"]
    depends_on:
      mongo1:
        condition: service_started
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db

  mongodb-rs-init:
    image: mongo:7
    depends_on:
      mongo1:
        condition: service_started
      mongo2:
        condition: service_started
    restart: "no"
    entrypoint:
      - bash
      - -lc
      - |
        set -euo pipefail

        echo "Waiting for mongo1..."
        until mongosh --quiet mongodb://mongo1:27017/admin --eval "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)" >/dev/null 2>&1; do
          sleep 2
        done

        echo "Waiting for mongo2..."
        until mongosh --quiet mongodb://mongo2:27017/admin --eval "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)" >/dev/null 2>&1; do
          sleep 2
        done

        echo "Initializing MongoDB replica set..."
        mongosh --quiet mongodb://mongo1:27017/admin --eval '
          try {
            rs.status();
            print("Replica set already initialized");
          } catch (error) {
            rs.initiate({
              _id: "myReplicaSet",
              members: [
                { _id: 0, host: "mongo1:27017" },
                { _id: 1, host: "mongo2:27017" }
              ]
            });
            print("Replica set initialized");
          }
        '

        echo "Waiting for PRIMARY election..."
        until mongosh --quiet mongodb://mongo1:27017/admin --eval '
          const primary = rs.status().members.some((member) => member.stateStr === "PRIMARY");
          quit(primary ? 0 : 1);
        ' >/dev/null 2>&1; do
          sleep 2
        done

        echo "Replica set ready"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      mongo1:
        condition: service_started
      mongo2:
        condition: service_started
      mongodb-rs-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongo1:27017,mongo2:27017/bank?replicaSet=myReplicaSet
      - NODE_ENV=${NODE_ENV:-development}
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_URL: ${SERVICE_URL_SERVER:-http://localhost:4000}/graphql
        VITE_GRAPHQL_WS_URL: ${VITE_GRAPHQL_WS_URL:-ws://localhost:4000/graphql}
    depends_on:
      server:
        condition: service_started
    ports:
      - "4173:80"
    restart: always

volumes:
  mongo1_data:
  mongo2_data:
