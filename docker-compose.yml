services:
  mongo1:
    image: mongo:7
    container_name: mongo1
    command: ["mongod", "--replSet", "myReplicaSet", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.adminCommand({ ping: 1 }).ok' | mongosh --quiet mongodb://127.0.0.1:27017/admin | grep 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - mongo1_data:/data/db

  mongo2:
    image: mongo:7
    container_name: mongo2
    command: ["mongod", "--replSet", "myReplicaSet", "--bind_ip_all", "--port", "27017"]
    depends_on:
      mongo1:
        condition: service_healthy
    ports:
      - "27018:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.adminCommand({ ping: 1 }).ok' | mongosh --quiet mongodb://127.0.0.1:27017/admin | grep 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - mongo2_data:/data/db

  mongodb-rs-init:
    image: mongo:7
    container_name: mongodb-rs-init
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -lc
      - |
        echo "Waiting for MongoDB replica set init..."
        mongosh --quiet mongodb://mongo1:27017/admin --eval '
          try {
            rs.status();
            print("Replica set already initialized");
          } catch (error) {
            rs.initiate({
              _id: "myReplicaSet",
              members: [
                { _id: 0, host: "mongo1" },
                { _id: 1, host: "mongo2" }
              ]
            });
            print("Replica set initialized");
          }
        '

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: subli-server
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongodb-rs-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo1:27017,mongo2:27017/bank?replicaSet=myReplicaSet}
      - NODE_ENV=${NODE_ENV:-development}
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_URL: ${VITE_GRAPHQL_URL:-http://localhost:4000/graphql}
        VITE_GRAPHQL_WS_URL: ${VITE_GRAPHQL_WS_URL:-ws://localhost:4000/graphql}
    container_name: subli-web
    depends_on:
      server:
        condition: service_started
    ports:
      - "4173:80"
    restart: always

volumes:
  mongo1_data:
  mongo2_data:
