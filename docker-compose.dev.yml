services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=bank
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.adminCommand({ ping: 1 }).ok' | mongosh --quiet mongodb://127.0.0.1:27017/admin | grep 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - mongodb_data:/data/db
    restart: always

  mongodb-rs-init:
    image: mongo:7
    container_name: mongodb-rs-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -lc
      - |
        echo "Waiting for MongoDB replica set init..."
        mongosh --quiet mongodb://mongodb:27017/admin --eval '
          try {
            rs.status();
            print("Replica set already initialized");
          } catch (error) {
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "mongodb:27017" }]
            });
            print("Replica set initialized");
          }
        '

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: woovi-server
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-rs-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongodb:27017/woovi-bank?replicaSet=rs0
      - CORS_ORIGIN=http://localhost:4173
      - SESSION_SECRET=change-me
      - SESSION_COOKIE_NAME=woovi_session
      - WOOVI_APP_ID=your-woovi-app-id
      - WOOVI_BASE_URL=https://api.woovi-sandbox.com
    ports:
      - "4000:4000"
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_URL: http://localhost:4000/graphql
        VITE_GRAPHQL_WS_URL: ws://localhost:4000/graphql
    container_name: woovi-web
    depends_on:
      server:
        condition: service_started
    ports:
      - "4173:4173"
    restart: always

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mongodb_data:
